spring.application.name=news-service
logging.level.org.springframework.security=DEBUG
server.port=8082
#postgre
spring.datasource.url=jdbc:postgresql://localhost:5432/news_db
spring.datasource.username=postgres
spring.datasource.password=253421

spring.threads.virtual.enabled=true

#otel
management.tracing.sampling.probability=0.1
management.otlp.metrics.export.url=http://63.176.49.3:4318/v1/metrics
management.opentelemetry.tracing.export.otlp.endpoint=http://63.176.49.3:4318/v1/traces

#keycloak
spring.security.oauth2.resourceserver.jwt.issuer-uri=http://localhost:9090/realms/FinancePortal
keycloak.clientId=finance-gateway-client

#orm
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
#flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.user=${spring.datasource.username}
spring.flyway.password=${spring.datasource.password}
#news-api
news.api.yahoo.url=https://feeds.finance.yahoo.com/rss/2.0/headline?s=AAPL&region=US&lang=en-US
news.api.sozcu.base.url=https://www.sozcu.com.tr
model.service.api.url=http://localhost:8083/api/v1/news/classify

