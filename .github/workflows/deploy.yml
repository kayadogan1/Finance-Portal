name: Build and Dockerize

on:
  push:
    branches: [ "main", "master", "develop" ]
  pull_request:
    branches: [ "main", "master" ]

permissions:
  contents: read
  pull-requests: read
  packages: write  

jobs:
  build-and-dockerize:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Detect Changes
        uses: dorny/paths-filter@v3
        id: changes
        with:
          filters: |
            finance:
              - 'finance-service/**'
              - 'pom.xml'
            news:
              - 'news-service/**'
              - 'pom.xml'
            gateway:
              - 'api-gateway/**'
              - 'pom.xml'

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build with Maven
        run: mvn -B clean package -DskipTests

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & Push Finance Service
        if: steps.changes.outputs.finance == 'true'
        run: |
          IMAGE=ghcr.io/${{ github.repository_owner }}/finance-service:${{ github.sha }}
          docker build -t $IMAGE -f finance-service/Dockerfile .
          docker push $IMAGE

      - name: Build & Push News Service
        if: steps.changes.outputs.news == 'true'
        run: |
          IMAGE=ghcr.io/${{ github.repository_owner }}/news-service:${{ github.sha }}
          docker build -t $IMAGE -f news-service/Dockerfile .
          docker push $IMAGE

      - name: Build & Push API Gateway
        if: steps.changes.outputs.gateway == 'true'
        run: |
          IMAGE=ghcr.io/${{ github.repository_owner }}/api-gateway:${{ github.sha }}
          docker build -t $IMAGE -f api-gateway/Dockerfile .
          docker push $IMAGE
