spring.datasource.url=jdbc:postgresql://localhost:5432/finance_db
spring.datasource.username=postgres
spring.datasource.password=253421

spring.application.name=finance-service


spring.security.oauth2.resourceserver.jwt.issuer-uri=http://localhost:9090/realms/FinancePortal

spring.threads.virtual.enabled=true

spring.data.redis.host=localhost
spring.data.redis.port=6379

management.tracing.sampling.probability=0.1
management.otlp.metrics.export.url=http://localhost:4318/v1/metrics
management.opentelemetry.tracing.export.otlp.endpoint=http://localhost:4318/v1/traces

server.port=8081

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

keycloak.clientId=finance-gateway-client

spring.flyway.enabled=true

spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.user=${spring.datasource.username}
spring.flyway.password=${spring.datasource.password}

finance.binance.api.base-url=https://api.binance.com
finance.YAHOO_API_URL=https://query2.finance.yahoo.com/v8/finance/chart/{symbol}?interval=1d&period1={period1}&period2={period2}