spring.datasource.url=jdbc:postgresql://localhost:5432/finance_db
spring.datasource.username=postgres
spring.datasource.password=253421
spring.jpa.properties.hibernate.jdbc.batch_size=50
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
spring.jpa.properties.hibernate.generate_statistics=false

spring.application.name=finance-service

logging.level.org.hibernate=OFF
logging.level.org.hibernate.SQL=OFF
logging.level.org.hibernate.orm.jdbc.bind=OFF
spring.security.oauth2.resourceserver.jwt.issuer-uri=http://localhost:9090/realms/FinancePortal

spring.threads.virtual.enabled=true

spring.data.redis.host=localhost
spring.data.redis.port=6379

management.tracing.sampling.probability=1.0
management.otlp.metrics.export.url=http://18.184.161.148:4318/v1/metrics
management.opentelemetry.tracing.export.otlp.endpoint=http://18.184.161.148/v1/traces

server.port=8081

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

keycloak.clientId=finance-gateway-client

spring.flyway.enabled=true

spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.user=${spring.datasource.username}
spring.flyway.password=${spring.datasource.password}

finance.binance.api.base-url=https://api.binance.com
finance.YAHOO_API_URL=https://query2.finance.yahoo.com/v8/finance/chart/{symbol}?interval=1d&period1={period1}&period2={period2}
finance.YAHOO_API_BASE_URL=https://query2.finance.yahoo.com/v8/finance/chart/{symbol}?interval=1d&range=1d
finance.FINTABLES.API_URL=https://gate.fintables.com/barbar/udf/history

evds.api.key=${EVDS_PASSWORD}
