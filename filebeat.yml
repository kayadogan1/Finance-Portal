filebeat.inputs:
  - type: filestream
    id: local-spring-logs
    enabled: true
    paths:
      - /logs/*.log
    parsers:
      - ndjson:
          target: ""
          overwrite_keys: true
          add_error_key: true

output.elasticsearch:
  hosts: ["http://63.176.49.3:9200"]
  index: "finance-logs-%{+yyyy.MM.dd}"

setup.ilm.enabled: false
setup.template.name: "finance-logs"
setup.template.pattern: "finance-logs-*"

logging.level: info