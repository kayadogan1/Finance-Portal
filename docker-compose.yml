services:
  finance-frontend:
    container_name: finance-frontend
    build:
      context: ./finance-frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-}
        VITE_KEYCLOAK_URL: ${VITE_KEYCLOAK_URL:-http://localhost:9090}
    ports:
      - "${FRONTEND_PORT:-5173}:80"
    depends_on:
      api-gateway:
        condition: service_started
      keycloak-bootstrap:
        condition: service_completed_successfully
    networks:
      - finance-network

  api-gateway:
    container_name: api-gateway
    build:
      context: .
      dockerfile: ./api-gateway/Dockerfile
    environment:
      - SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_ISSUER_URI=${KEYCLOAK_ISSUER_URI:-http://localhost:9090/realms/FinancePortal}
      - SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_JWK_SET_URI=http://keycloak:8080/realms/FinancePortal/protocol/openid-connect/certs
      - SPRING_CLOUD_GATEWAY_SERVER_WEBFLUX_ROUTES_0_ID=news-service
      - SPRING_CLOUD_GATEWAY_SERVER_WEBFLUX_ROUTES_0_URI=http://news-service:8082
      - SPRING_CLOUD_GATEWAY_SERVER_WEBFLUX_ROUTES_0_PREDICATES_0=Path=/api/news/**
      - SPRING_CLOUD_GATEWAY_SERVER_WEBFLUX_ROUTES_1_ID=finance-service
      - SPRING_CLOUD_GATEWAY_SERVER_WEBFLUX_ROUTES_1_URI=http://finance-service:8081
      - SPRING_CLOUD_GATEWAY_SERVER_WEBFLUX_ROUTES_1_PREDICATES_0=Path=/api/market/**,/api/trade/**,/api/portfolio/**,/api/admin/**,/api/inflation/**
      - SPRING_CLOUD_GATEWAY_SERVER_WEBFLUX_ROUTES_2_ID=finance-openapi
      - SPRING_CLOUD_GATEWAY_SERVER_WEBFLUX_ROUTES_2_URI=http://finance-service:8081
      - SPRING_CLOUD_GATEWAY_SERVER_WEBFLUX_ROUTES_2_PREDICATES_0=Path=/finance/v3/api-docs
      - SPRING_CLOUD_GATEWAY_SERVER_WEBFLUX_ROUTES_2_FILTERS_0=RewritePath=/finance/v3/api-docs,/v3/api-docs
      - SPRING_CLOUD_GATEWAY_SERVER_WEBFLUX_ROUTES_3_ID=news-openapi
      - SPRING_CLOUD_GATEWAY_SERVER_WEBFLUX_ROUTES_3_URI=http://news-service:8082
      - SPRING_CLOUD_GATEWAY_SERVER_WEBFLUX_ROUTES_3_PREDICATES_0=Path=/news/v3/api-docs
      - SPRING_CLOUD_GATEWAY_SERVER_WEBFLUX_ROUTES_3_FILTERS_0=RewritePath=/news/v3/api-docs,/v3/api-docs
      - SPRING_CLOUD_GATEWAY_SERVER_WEBFLUX_ROUTES_4_ID=classification-openapi
      - SPRING_CLOUD_GATEWAY_SERVER_WEBFLUX_ROUTES_4_URI=http://classification-api:8083
      - SPRING_CLOUD_GATEWAY_SERVER_WEBFLUX_ROUTES_4_PREDICATES_0=Path=/classification/v3/api-docs
      - SPRING_CLOUD_GATEWAY_SERVER_WEBFLUX_ROUTES_4_FILTERS_0=RewritePath=/classification/v3/api-docs,/v3/api-docs
      - SPRING_CLOUD_GATEWAY_SERVER_WEBFLUX_ROUTES_5_ID=classification-api
      - SPRING_CLOUD_GATEWAY_SERVER_WEBFLUX_ROUTES_5_URI=http://classification-api:8083
      - SPRING_CLOUD_GATEWAY_SERVER_WEBFLUX_ROUTES_5_PREDICATES_0=Path=/api/v1/news/**
      - SPRINGDOC_SWAGGER_UI_URLS_0_NAME=Finance Service
      - SPRINGDOC_SWAGGER_UI_URLS_0_URL=/finance/v3/api-docs
      - SPRINGDOC_SWAGGER_UI_URLS_1_NAME=News Service
      - SPRINGDOC_SWAGGER_UI_URLS_1_URL=/news/v3/api-docs
      - SPRINGDOC_SWAGGER_UI_URLS_2_NAME=Classification API
      - SPRINGDOC_SWAGGER_UI_URLS_2_URL=/classification/v3/api-docs
      - SPRINGDOC_SWAGGER_UI_PATH=/swagger-ui.html
      - MANAGEMENT_OTLP_METRICS_EXPORT_URL=http://${REMOTE_OBSERVABILITY_HOST:-host.docker.internal}:4318/v1/metrics
      - MANAGEMENT_OPENTELEMETRY_TRACING_EXPORT_OTLP_ENDPOINT=http://${REMOTE_OBSERVABILITY_HOST:-host.docker.internal}:4318/v1/traces
    labels:
      - "co.elastic.logs/enabled=true"
      - "service_name=api-gateway"
      - "co.elastic.logs/json.keys_under_root=true"
      - "co.elastic.logs/json.overwrite_keys=true"
      - "co.elastic.logs/json.add_error_key=true"
    ports:
      - "8080:8080"
    depends_on:
      news-service:
        condition: service_started
      finance-service:
        condition: service_started
      classification-api:
        condition: service_started
      keycloak-bootstrap:
        condition: service_completed_successfully
    networks:
      - finance-network

  finance-service:
    container_name: finance-service
    build:
      context: .
      dockerfile: ./finance-service/Dockerfile
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/finance_db
      - SPRING_DATASOURCE_USERNAME=${DB_USER:-postgres}
      - SPRING_DATASOURCE_PASSWORD=${DB_PASSWORD:-253421}
      - SPRING_DATA_REDIS_HOST=redis
      - SPRING_DATA_REDIS_PORT=6379
      - SPRING_FLYWAY_URL=jdbc:postgresql://postgres:5432/finance_db
      - SPRING_FLYWAY_USER=${DB_USER:-postgres}
      - SPRING_FLYWAY_PASSWORD=${DB_PASSWORD:-253421}
      - EVDS_API_KEY=${EVDS_PASSWORD:-}
      - SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_ISSUER_URI=${KEYCLOAK_ISSUER_URI:-http://localhost:9090/realms/FinancePortal}
      - SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_JWK_SET_URI=http://keycloak:8080/realms/FinancePortal/protocol/openid-connect/certs
      - MANAGEMENT_OTLP_METRICS_EXPORT_URL=http://${REMOTE_OBSERVABILITY_HOST:-host.docker.internal}:4318/v1/metrics
      - MANAGEMENT_OPENTELEMETRY_TRACING_EXPORT_OTLP_ENDPOINT=http://${REMOTE_OBSERVABILITY_HOST:-host.docker.internal}:4318/v1/traces
      - SPRING_JPA_SHOW_SQL=false
      - SPRING_JPA_PROPERTIES_HIBERNATE_FORMAT_SQL=false
      - SPRING_JPA_PROPERTIES_HIBERNATE_GENERATE_STATISTICS=false
      - LOGGING_LEVEL_ORG_HIBERNATE=OFF
      - LOGGING_LEVEL_ORG_HIBERNATE_SQL=WARN
      - LOGGING_LEVEL_ORG_HIBERNATE_ORM_JDBC_BIND=WARN
    labels:
      - "co.elastic.logs/enabled=true"
      - "service_name=finance-service"
      - "co.elastic.logs/json.keys_under_root=true"
      - "co.elastic.logs/json.overwrite_keys=true"
      - "co.elastic.logs/json.add_error_key=true"
    ports:
      - "8081:8081"
    depends_on:
      redis:
        condition: service_started
      postgres-bootstrap:
        condition: service_completed_successfully
    networks:
      - finance-network

  news-service:
    container_name: news-service
    build:
      context: .
      dockerfile: ./news-service/Dockerfile
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/news_db
      - SPRING_DATASOURCE_USERNAME=${DB_USER:-postgres}
      - SPRING_DATASOURCE_PASSWORD=${DB_PASSWORD:-253421}
      - SPRING_FLYWAY_URL=jdbc:postgresql://postgres:5432/news_db
      - SPRING_FLYWAY_USER=${DB_USER:-postgres}
      - SPRING_FLYWAY_PASSWORD=${DB_PASSWORD:-253421}
      - SPRING_FLYWAY_ENABLED=true
      - MODEL_SERVICE_API_URL=http://classification-api:8083/api/v1/news/classify
      - SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_ISSUER_URI=${KEYCLOAK_ISSUER_URI:-http://localhost:9090/realms/FinancePortal}
      - SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_JWK_SET_URI=http://keycloak:8080/realms/FinancePortal/protocol/openid-connect/certs
      - MANAGEMENT_OTLP_METRICS_EXPORT_URL=http://${REMOTE_OBSERVABILITY_HOST:-host.docker.internal}:4318/v1/metrics
      - MANAGEMENT_OPENTELEMETRY_TRACING_EXPORT_OTLP_ENDPOINT=http://${REMOTE_OBSERVABILITY_HOST:-host.docker.internal}:4318/v1/traces
      - SPRING_JPA_SHOW_SQL=false
      - SPRING_JPA_PROPERTIES_HIBERNATE_FORMAT_SQL=false
      - LOGGING_LEVEL_ORG_HIBERNATE=OFF
      - LOGGING_LEVEL_ORG_HIBERNATE_SQL=WARN
      - LOGGING_LEVEL_ORG_HIBERNATE_ORM_JDBC_BIND=WARN
    labels:
      - "co.elastic.logs/enabled=true"
      - "service_name=news-service"
      - "co.elastic.logs/json.keys_under_root=true"
      - "co.elastic.logs/json.overwrite_keys=true"
      - "co.elastic.logs/json.add_error_key=true"
    ports:
      - "8082:8082"
    depends_on:
      postgres-bootstrap:
        condition: service_completed_successfully
      classification-api:
        condition: service_started
    networks:
      - finance-network

  classification-api:
    container_name: classification-api
    build:
      context: .
      dockerfile: ./classification-api/Dockerfile
    environment:
      - CLASSIFICATION_AUDIT_PATH=/app/output/classification_audit.csv
    labels:
      - "co.elastic.logs/enabled=true"
      - "service_name=classification-api"
      - "co.elastic.logs/json.keys_under_root=true"
      - "co.elastic.logs/json.overwrite_keys=true"
      - "co.elastic.logs/json.add_error_key=true"
    ports:
      - "8083:8083"
    networks:
      - finance-network

  postgres:
    image: postgres:16-alpine
    container_name: finance_db
    restart: always
    environment:
      POSTGRES_DB: finance_db
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-253421}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db:/docker-entrypoint-initdb.d

    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${POSTGRES_DB:-finance_db}"]
      interval: 5s
      timeout: 5s
      retries: 20
    networks:
      - finance-network

  postgres-bootstrap:
    image: postgres:16-alpine
    container_name: finance_postgres_bootstrap
    entrypoint: ["/bin/sh", "/scripts/bootstrap-postgres.sh"]
    environment:
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-253421}
    volumes:
      - ./scripts:/scripts:ro
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - finance-network
    restart: "no"

  redis:
    image: redis:7-alpine
    container_name: finance-redis
    restart: always
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    networks:
      - finance-network

  filebeat:
    image: docker.elastic.co/beats/filebeat:8.11.1
    container_name: finance_filebeat
    user: root
    volumes:
      - ./filebeat.yml:/usr/share/filebeat/filebeat.yml:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      - ELASTICSEARCH_HOSTS=http://${REMOTE_OBSERVABILITY_HOST:-host.docker.internal}:9200
    networks:
      - finance-network

  keycloak:
    image: quay.io/keycloak/keycloak:23.0.7
    container_name: finance_keycloak
    command: start-dev --import-realm
    environment:
      KC_HOSTNAME_URL: ${KEYCLOAK_HOSTNAME_URL:-http://localhost:9090}
      KC_HOSTNAME_STRICT: "false"
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/keycloak
      KC_DB_USERNAME: ${DB_USER:-postgres}
      KC_DB_PASSWORD: ${DB_PASSWORD:-253421}
    ports:
      - "9090:8080"
    volumes:
      - ./keycloak/realms:/opt/keycloak/data/import
      - ./keycloak/themes:/opt/keycloak/themes
    restart: always
    depends_on:
      postgres-bootstrap:
        condition: service_completed_successfully
      openldap:
        condition: service_started
    networks:
      - finance-network

  keycloak-bootstrap:
    image: quay.io/keycloak/keycloak:23.0.7
    container_name: finance_keycloak_bootstrap
    entrypoint: ["/bin/sh", "/scripts/bootstrap-keycloak.sh"]
    environment:
      KEYCLOAK_SERVER: http://keycloak:8080
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KEYCLOAK_REALM: FinancePortal
      KEYCLOAK_CLIENT_ID: finance-gateway-client
      KEYCLOAK_DEFAULT_ROLE: default-roles-financeportal
      KEYCLOAK_USER_ROLE: USER
    volumes:
      - ./scripts:/scripts:ro
    depends_on:
      keycloak:
        condition: service_started
    networks:
      - finance-network
    restart: "no"
  openldap:
    image: osixia/openldap:1.5.0
    container_name: finance_openldap
    environment:
      LDAP_ORGANISATION: "Finance Portal"
      LDAP_DOMAIN: "finance.local"
      LDAP_ADMIN_PASSWORD: "admin"
      LDAP_CONFIG_PASSWORD: "config"
      LDAP_READONLY_USER: "true"
      LDAP_READONLY_USER_USERNAME: "readonly"
      LDAP_READONLY_USER_PASSWORD: "readonly"
    ports:
      - "389:389"
      - "636:636"
    volumes:
      - ldap_data:/var/lib/ldap
      - ldap_config:/etc/ldap/slapd.d
    networks:
      - finance-network
  phpldapadmin:
    image: osixia/phpldapadmin:latest
    container_name: finance_phpldapadmin
    environment:
      PHPLDAPADMIN_LDAP_HOSTS: openldap
      PHPLDAPADMIN_HTTPS: "false"
    ports:
     - "8085:80"
    depends_on:
      - openldap
    networks:
      - finance-network

networks:
  finance-network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  ldap_data:
  ldap_config:
