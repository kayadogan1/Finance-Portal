services:
  api-gateway:
    container_name: api-gateway
    restart: always
    build:
      context: .
      dockerfile: ./api-gateway/Dockerfile
    environment:
      - SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_ISSUER_URI=http://keycloak:8080/realms/FinancePortal
      - SPRING_CLOUD_GATEWAY_ROUTES_0_ID=news-service
      - SPRING_CLOUD_GATEWAY_ROUTES_0_URI=http://news-service:8082
      - SPRING_CLOUD_GATEWAY_ROUTES_0_PREDICATES_0=Path=/api/news/**
      - SPRING_CLOUD_GATEWAY_ROUTES_1_ID=finance-service
      - SPRING_CLOUD_GATEWAY_ROUTES_1_URI=http://finance-service:8081
      - SPRING_CLOUD_GATEWAY_ROUTES_1_PREDICATES_0=Path=/api/market/**,/api/trade/**,/api/portfolio/**
    ports:
      - "8080:8080"
    depends_on:
      - news-service
      - finance-service
      - keycloak
    networks:
      - finance-network
  finance-service:
    container_name: finance-service
    restart: always
    build:
      context: .
      dockerfile: ./finance-service/Dockerfile
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/finance_db
      - SPRING_DATASOURCE_USERNAME=${DB_USER:-postgres}
      - SPRING_DATASOURCE_PASSWORD=${DB_PASSWORD:-253421}
      - SPRING_DATA_REDIS_HOST=redis
      - SPRING_DATA_REDIS_PORT=6379
      - SPRING_FLYWAY_URL=jdbc:postgresql://postgres:5432/finance_db
      - SPRING_FLYWAY_USER=${DB_USER:-postgres}
      - SPRING_FLYWAY_PASSWORD=${DB_PASSWORD:-253421}
    ports:
      - "8081:8081"
    depends_on:
      - redis
      - postgres
    networks:
      - finance-network

  news-service:
    container_name: news-service
    restart: always
    build:
      context: .
      dockerfile: ./news-service/Dockerfile
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/news_db
      - SPRING_DATASOURCE_USERNAME=${DB_USER:-postgres}
      - SPRING_DATASOURCE_PASSWORD=${DB_PASSWORD:-253421}
      - SPRING_FLYWAY_URL=jdbc:postgresql://postgres:5432/news_db
      - SPRING_FLYWAY_USER=${DB_USER:-postgres}
      - SPRING_FLYWAY_PASSWORD=${DB_PASSWORD:-253421}
      - SPRING_FLYWAY_ENABLED=true
    ports:
      - "8082:8082"
    depends_on:
      - postgres
    networks:
      - finance-network

  postgres:
    image: postgres:16-alpine
    container_name: finance_db
    restart: always
    environment:
      POSTGRES_DB: finance_db
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-253421}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - finance-network

  redis:
    image: redis:7-alpine
    container_name: finance-redis
    restart: always
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    networks:
      - finance-network

  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: redis-gui
    restart: always
    environment:
      - REDIS_HOSTS=local:redis:6379
    ports:
      - "8085:8081"
    depends_on:
      - redis
    networks:
      - finance-network

  keycloak:
    image: quay.io/keycloak/keycloak:23.0.0
    container_name: finance_keycloak
    restart: always
    command: start-dev --import-realm
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
    ports:
      - "9090:8080"
    volumes:
      - ./keycloak/realms:/opt/keycloak/data/import
    networks:
      - finance-network

networks:
  finance-network:
    driver: bridge

volumes:
  postgres_data:
  redis_data: